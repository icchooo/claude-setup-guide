<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Claude セットアップガイド</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f8f7f4;--surface:#ffffff;--surface-raised:#f0eeea;--border:#e0ddd6;
    --text:#1a1a1a;--text-dim:#6b6560;--accent:#c4873a;--accent-light:#fdf3e6;
    --success:#2d8a4e;--success-bg:#edf7f0;--warning:#c4651a;--warning-bg:#fef3e8;
    --info:#2563a8;--info-bg:#eef4fb;--code-bg:#fdfcfa;--code-border:#e8e4de;
    --radius:16px;--radius-sm:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100dvh;overflow-x:hidden}

  .header{position:sticky;top:0;z-index:100;background:rgba(248,247,244,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 20px}
  .header-inner{display:flex;align-items:center;justify-content:space-between;max-width:600px;margin:0 auto}
  .header-title{font-size:14px;font-weight:700;color:var(--accent)}
  .progress-pill{font-size:12px;font-weight:600;color:var(--text-dim);background:var(--surface);padding:4px 12px;border-radius:100px;border:1px solid var(--border)}
  .progress-track{height:3px;background:var(--border)}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#e0a85c);transition:width .5s cubic-bezier(.4,0,.2,1);border-radius:0 2px 2px 0}
  .main{max-width:600px;margin:0 auto;padding:0 20px 110px}

  /* LANDING */
  .landing{min-height:calc(100dvh - 60px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 0}
  .landing-icon{width:80px;height:80px;border-radius:24px;overflow:hidden;margin-bottom:28px;box-shadow:0 8px 30px rgba(196,135,58,.2)}.landing-icon img{width:100%;height:100%;object-fit:cover}
  .landing h1{font-size:26px;font-weight:900;line-height:1.35;margin-bottom:12px;letter-spacing:-.02em;color:var(--text)}
  .landing h1 span{color:var(--accent)}
  .landing>p{font-size:14px;color:var(--text-dim);max-width:90%;margin-bottom:12px;line-height:1.7}
  .selector-label{font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:10px}
  .os-selector,.tool-selector{display:flex;gap:10px;margin-bottom:28px;width:100%;max-width:340px}
  .os-btn,.tool-btn{flex:1;padding:14px 8px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-dim);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
  .tool-btn{font-size:12px;line-height:1.4;text-align:center}
  .os-btn .os-icon{font-size:24px}.tool-btn .tool-icon{font-size:20px;display:block;margin-bottom:2px}
  .os-btn.active,.tool-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--text)}
  .start-btn{width:100%;max-width:340px;padding:16px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#d4a053);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s;box-shadow:0 4px 16px rgba(196,135,58,.25)}
  .start-btn:active{transform:scale(.97)}.start-btn:disabled{opacity:.4;cursor:not-allowed}

  /* STEP */
  .step-screen{display:none;padding-top:28px}.step-screen.active{display:block;animation:fadeUp .35s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .step-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);background:var(--accent-light);padding:5px 12px;border-radius:100px;margin-bottom:16px}
  .step-title{font-size:22px;font-weight:800;margin-bottom:8px;line-height:1.35}
  .step-desc{font-size:14px;color:var(--text-dim);margin-bottom:24px;line-height:1.7}

  .instruction{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .instruction-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px}
  .instruction h3{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text)}
  .instruction p,.instruction li{font-size:13px;color:var(--text-dim);line-height:1.7}
  .instruction a{color:var(--accent);text-decoration:underline;font-weight:600}
  .instruction ul{list-style:none;margin-top:8px}
  .instruction ul li{padding:4px 0 4px 18px;position:relative}
  .instruction ul li::before{content:'•';position:absolute;left:4px;color:var(--accent)}

  .code-block{background:var(--code-bg);border:1px solid var(--code-border);border-radius:var(--radius-sm);padding:14px 16px;margin:12px 0;position:relative;overflow-x:auto}
  .code-block code{font-family:'JetBrains Mono',monospace;font-size:13px;color:#8b5e1a;white-space:pre-wrap;word-break:break-all}
  .copy-btn{position:absolute;top:8px;right:8px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
  .copy-btn.copied{background:var(--success-bg);border-color:var(--success);color:var(--success)}

  .callout{border-radius:var(--radius-sm);padding:14px 16px;margin:14px 0;font-size:13px;line-height:1.65;display:flex;gap:10px}
  .callout-icon{font-size:18px;flex-shrink:0;margin-top:1px}
  .callout.tip{background:var(--success-bg);border:1px solid rgba(45,138,78,.2);color:var(--success)}
  .callout.warn{background:var(--warning-bg);border:1px solid rgba(196,101,26,.2);color:var(--warning)}
  .callout.info{background:var(--info-bg);border:1px solid rgba(37,99,168,.15);color:var(--info)}

  /* SCREENSHOT PLACEHOLDER */
  .screenshot-placeholder{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius-sm);padding:24px 16px;text-align:center;margin:14px 0;color:var(--text-dim);font-size:12px;line-height:1.6}
  .screenshot-placeholder .ph-icon{font-size:28px;margin-bottom:6px;display:block}
  .screenshot-placeholder .ph-label{font-weight:600;font-size:13px;color:var(--text);margin-bottom:2px}
  .screenshot-placeholder img{max-width:100%;border-radius:8px;margin-top:8px;display:block}
  .screenshot-box{margin:14px 0;text-align:center}
  .screenshot-box img{max-width:100%;border-radius:var(--radius-sm);box-shadow:0 2px 12px rgba(0,0,0,.12);display:block;margin:0 auto}
  .screenshot-caption{font-size:12px;color:var(--text-dim);margin-top:6px}

  .plan-cards{display:flex;flex-direction:column;gap:10px;margin:12px 0}
  .plan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
  .plan-card.recommended{border-color:var(--accent);background:var(--accent-light)}
  .plan-name{font-size:14px;font-weight:700}.plan-price{font-size:13px;color:var(--text-dim)}
  .plan-badge{font-size:10px;font-weight:700;color:var(--accent);background:rgba(196,135,58,.12);padding:3px 8px;border-radius:4px;margin-left:8px}

  .tab-visual{display:flex;gap:0;margin:12px 0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
  .tab-item{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:600;background:var(--surface);color:var(--text-dim);border-right:1px solid var(--border)}
  .tab-item:last-child{border-right:none}
  .tab-item.highlight{background:var(--accent-light);color:var(--accent);border-bottom:2px solid var(--accent)}

  .checklist{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .check-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;font-size:14px;user-select:none;-webkit-user-select:none}
  .check-item:last-child{border-bottom:none}
  .check-item:active{background:var(--surface-raised)}
  .check-box{width:24px;height:24px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:14px}
  .check-item.checked .check-box{background:var(--success);border-color:var(--success);color:#fff}
  .check-item.checked .check-label{color:var(--text-dim);text-decoration:line-through}

  /* NAV */
  .nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(248,247,244,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:12px 20px calc(12px + env(safe-area-inset-bottom));display:none;gap:10px;justify-content:center;max-width:640px;margin:0 auto}
  .nav-bar.visible{display:flex}
  .nav-btn{flex:1;max-width:280px;padding:14px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
  .nav-btn:active{transform:scale(.97)}
  .nav-btn.secondary{background:var(--surface);color:var(--text-dim);border:1px solid var(--border)}
  .nav-btn.primary{background:linear-gradient(135deg,var(--accent),#d4a053);color:#fff;box-shadow:0 4px 12px rgba(196,135,58,.2)}

  .completion{min-height:calc(100dvh - 120px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 0}
  .completion-icon{width:80px;height:80px;border-radius:50%;background:var(--success-bg);border:2px solid var(--success);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:24px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .completion h2{font-size:24px;font-weight:900;margin-bottom:10px}
  .completion p{font-size:14px;color:var(--text-dim);max-width:320px;margin-bottom:28px}
  .restart-btn{padding:12px 28px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="header"><div class="header-inner"><div class="header-title">Claude セットアップガイド</div><div class="progress-pill" id="progressPill">― / ―</div></div></div>
<div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="main">
  <div class="landing" id="landing">
    <div class="landing-icon"><img src="claude-icon.jpg" alt="Claude"></div>
    <h1>スマホを見ながら<br><span>迷わずセットアップ</span></h1>
    <p>Claudeデスクトップアプリの導入をゼロから案内します。Code・Coworkどちらもアプリ内で使えます。</p>
    <p style="font-size:13px;color:var(--text-dim);margin-top:8px;margin-bottom:32px;max-width:90%;line-height:1.7;">ガイド内のリンクから各ページへ直接アクセスできます。<br>スマホとパソコンの両方を併用して進めるのがおすすめです。</p>
    <div class="selector-label">① あなたのPCは？</div>
    <div class="os-selector">
      <button class="os-btn" data-os="windows" onclick="selectOS('windows')"><span class="os-icon">🪟</span> Windows</button>
      <button class="os-btn" data-os="mac" onclick="selectOS('mac')"><span class="os-icon">🍎</span> Mac</button>
    </div>
    <div class="selector-label">② 何を使いたい？</div>
    <div class="tool-selector">
      <button class="tool-btn" data-tool="code" onclick="selectTool('code')"><span class="tool-icon">⌨️</span>Code</button>
      <button class="tool-btn" data-tool="cowork" onclick="selectTool('cowork')"><span class="tool-icon">🤝</span>Cowork</button>
      <button class="tool-btn" data-tool="both" onclick="selectTool('both')"><span class="tool-icon">✨</span>両方</button>
    </div>
    <button class="start-btn" id="startBtn" disabled onclick="startGuide()">選択してください</button>
  </div>
  <div id="stepContainer"></div>
</div>
<div class="nav-bar" id="navBar">
  <button class="nav-btn secondary" id="prevBtn" onclick="prevStep()">← 戻る</button>
  <button class="nav-btn primary" id="nextBtn" onclick="nextStep()">次へ →</button>
</div>
<script>
let selectedOS=null,selectedTool=null,currentStep=0,steps=[];
function selectOS(os){selectedOS=os;document.querySelectorAll('.os-btn').forEach(b=>b.classList.toggle('active',b.dataset.os===os));updateStartBtn();}
function selectTool(tool){selectedTool=tool;document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));updateStartBtn();}
function updateStartBtn(){const btn=document.getElementById('startBtn');if(selectedOS&&selectedTool){btn.disabled=false;btn.textContent='セットアップを始める 🚀';}}

function tabVis(hl){
  const labels=['Chat','Cowork','Code'];
  return '<div class="tab-visual">'+labels.map(l=>`<div class="tab-item${l===hl?' highlight':''}">${l}${l===hl?' ← ここ':''}</div>`).join('')+'</div>';
}

/* Screenshot image helper */
const imgMap = {
  'signup': '1.jpg',
  'billing': '2.jpg',
  'install': '3.jpg',
  'terminal-open': 'terminal-open.jpg',
  'git-install-cmd': 'git-install-cmd.jpg',
  'code-example': 'code-example.jpg?v=2',
  'install-mac-drag': 'install-mac-drag.jpg',
  'login': '6.jpg?v=2',
  'tabs': '7.jpg?v=2',
  'git-mac-check': '10.jpg',
  'code-local': '11.jpg?v=2',
  'cowork-tab': '8.jpg?v=2',
  'cowork-proceed': '9.jpg?v=2',
  'install-win': 'install-win.jpg'
};
function imgSlot(id, label){
  if(imgMap[id]){
    return `<div class="screenshot-box" id="img-${id}">
      <img src="${imgMap[id]}" alt="${label}" loading="lazy">
      <div class="screenshot-caption">${label}</div>
    </div>`;
  }
  return `<div class="screenshot-placeholder" id="img-${id}">
    <span class="ph-icon">📸</span>
    <div class="ph-label">${label}</div>
    <div>ここにスクリーンショットを追加予定</div>
  </div>`;
}
function imgDirect(src, label){
  return `<div class="screenshot-box">
    <img src="${src}" alt="${label}" loading="lazy">
    <div class="screenshot-caption">${label}</div>
  </div>`;
}

function buildSteps(){
  steps=[];
  const W=selectedOS==='windows';
  const wantCode=selectedTool==='code'||selectedTool==='both';
  const wantCowork=selectedTool==='cowork'||selectedTool==='both';
  let n=1;

  /* 1: アカウント */
  steps.push({badge:`STEP ${n++}`,title:'Claudeのアカウントを作ろう',desc:'すでにアカウントをお持ちの方は「次へ」で飛ばしてOKです。',content:`
    <div class="instruction"><div class="instruction-num">1</div><h3>Claudeの公式サイトを開く</h3><p>PCのブラウザで以下のリンクを開いてください：</p><p><a href="https://claude.ai" target="_blank" rel="noopener">https://claude.ai を開く ↗</a></p></div>
    <div class="instruction"><div class="instruction-num">2</div><h3>アカウントを作成する</h3><p>画面の「Sign up」（サインアップ）をクリックします。</p><ul><li><strong>Googleアカウント</strong>で登録するのが最も簡単です</li><li>メールアドレスでの登録も可能です</li></ul></div>
    ${imgSlot('signup','claude.aiのサインアップ画面')}
    <div class="instruction"><div class="instruction-num">3</div><h3>メール認証または電話番号での認証を完了する</h3><p>メールアドレスで登録した場合は確認メールが届きます。メール内のリンクをクリックして認証を完了してください。Googleアカウントで登録した場合は電話番号での認証（SMS）が求められることがあります。</p></div>
    <div class="callout info"><span class="callout-icon">💡</span><div>この時点ではまだ無料プランです。次のステップで有料プランに切り替えます。</div></div>`});

  /* 2: プラン */
  steps.push({badge:`STEP ${n++}`,title:'有料プランに加入する',desc:'CodeとCoworkを使うには有料プラン（最低Pro）が必要です。すでに加入済みの方は「次へ」で飛ばしてください。',content:`
    <div class="instruction"><div class="instruction-num">1</div><h3>プランページを開く</h3><p>ログインした状態で以下を開いてください：</p><p><a href="https://claude.ai/settings/billing" target="_blank" rel="noopener">プラン設定ページを開く ↗</a></p><p>または、画面左下の自分のアイコン →「Settings」→「Billing」からも行けます。</p></div>
    ${imgSlot('billing','Billing設定画面')}
    <div class="instruction"><div class="instruction-num">2</div><h3>プランを選ぶ</h3><div class="plan-cards"><div class="plan-card recommended"><div><span class="plan-name">Pro</span><span class="plan-badge">おすすめ</span></div><span class="plan-price">月$22（約3,300円）</span></div><div class="plan-card"><div><span class="plan-name">Max</span></div><span class="plan-price">月$110〜（ヘビー向け）</span></div></div><p style="font-size:13px;color:var(--text-dim);margin-top:8px;">まずはProで十分です。使い込んで足りなくなったらMaxを検討しましょう。</p></div>
    <div class="callout warn"><span class="callout-icon">⚠️</span><div><strong>「月間」を選択してください。</strong>契約更新も解除も柔軟にできるように、まずは月間契約で試してみることをおすすめします。</div></div>
    <div class="instruction"><div class="instruction-num">3</div><h3>支払い情報を入力</h3><p>クレジットカード情報を入力して「Subscribe」（購読する）をクリックします。</p></div>
    <div class="callout warn"><span class="callout-icon">⚠️</span><div><strong>無料プランではCodeもCoworkも使えません。</strong>必ずPro以上に加入してから次へ進んでください。</div></div>`});

  /* 3: アプリDL */
  steps.push({badge:`STEP ${n++}`,title:'Claudeデスクトップアプリを入れる',desc:'Code・Coworkはどちらもこのアプリの中に入っています。ターミナル（黒い画面）は使いません。',content:`
    <div class="instruction"><div class="instruction-num">1</div><h3>ダウンロードページを開く</h3><p>以下のリンクからダウンロードページに移動してください：</p><p><a href="https://claude.ai/download" target="_blank" rel="noopener">Claudeアプリのダウンロードページ ↗</a></p></div>
    <div class="instruction"><div class="instruction-num">2</div><h3>${W?'Windows版':'Mac版'}をダウンロード</h3><p>「${W?'Download for Windows':'Download for macOS'}」をクリックします。数MBなのですぐ完了します。</p></div>
    <div class="instruction"><div class="instruction-num">3</div><h3>インストール</h3>${W?'<p>ダウンロードしたファイルをダブルクリックして実行します。画面の指示に従って進めてください。設定の変更は不要です。</p>':'<p>ダウンロードした .dmg ファイルを開き、Claudeのアイコンを「Applications」フォルダにドラッグ＆ドロップします。</p>'}</div>
    ${W ? imgSlot('install-win', 'Windowsインストール画面') : imgSlot('install', 'インストール画面')}
    ${W ? '' : imgSlot('install-mac-drag', 'MacのApplicationsへドラッグ')}
    <div class="callout tip"><span class="callout-icon">✅</span><div>これ1つでChat・Cowork・Codeすべて使えます。別々にインストールする必要はありません。</div></div>`});

  /* 4: ログイン */
  steps.push({badge:`STEP ${n++}`,title:'アプリを起動してログイン',desc:'インストールしたアプリを開いて、Claudeアカウントでログインします。',content:`
    <div class="instruction"><div class="instruction-num">1</div><h3>アプリを起動する</h3>${W?'<p>Windowsキー（左下のロゴマーク）を押して「<strong>Claude</strong>」と検索 → 表示された「Claude」アプリをクリックします。</p>':'<p>Launchpad（ロケットのアイコン）を開くか、Finderの「アプリケーション」フォルダから「Claude」をダブルクリックします。</p>'}${W?'':imgDirect('4.jpg','LaunchpadからClaudeを探す')+imgDirect('5.jpg','検索窓で「Claude」と入力')}</div>
    <div class="instruction"><div class="instruction-num">2</div><h3>ログインする</h3><p>「Get Started」ボタンをクリックし、先ほど作成したClaudeアカウントでサインインします。</p><ul><li>Googleアカウントで登録した方 →「Continue with Google」をクリック</li><li>メールで登録した方 → メールアドレスとパスワードを入力</li></ul></div>
    ${imgSlot('login','ログイン後のチャット画面')}
    <div class="instruction"><div class="instruction-num">3</div><h3>アプリの構造を確認</h3><p>アプリの<strong>左上</strong>に<strong>3つのタブ</strong>があります（左から <strong>Chat / Cowork / Code</strong>）：</p>
    ${tabVis('')}
    <ul><li><strong>Chat</strong> ─ 通常のAIチャット（ブラウザ版と同じ機能）</li><li><strong>Cowork</strong> ─ AIが自律的にタスクをこなしてくれるエージェント</li><li><strong>Code</strong> ─ AIがファイルを直接編集してくれる開発ツール</li></ul></div>
    ${imgSlot('tabs','タブの切り替え位置')}
    <div class="callout info"><span class="callout-icon">💡</span><div>3つの機能が1つのアプリに入っています。タブを切り替えるだけで使い分けられます。</div></div>`});

  /* 5: Cowork タブ */
  if(wantCowork){
    steps.push({badge:`STEP ${n++} ─ Cowork`,title:'Coworkタブを開いて使ってみよう',desc:'Claudeがあなたの代わりにタスクを自律的にこなしてくれる機能です。',content:`
      <div class="instruction"><div class="instruction-num">1</div><h3>「Cowork」タブをクリック</h3><p>アプリ左上の<strong>Cowork</strong>アイコンをクリックします。</p>${tabVis('Cowork')}</div>
      ${imgSlot('cowork-tab','Coworkタブを開いた画面')}
      <div class="instruction"><div class="instruction-num">2</div><h3>自然言語でタスクを入力してみよう</h3><p>中央の入力欄に、やりたいことを日本語でそのまま入力します。例：</p><div class="code-block"><code>デスクトップにあるファイルを種類ごとにフォルダ分けしてください</code><button class="copy-btn" onclick="copyCode(this)">コピー</button></div></div>
      <div class="instruction"><div class="instruction-num">3</div><h3>フォルダへのアクセスを許可する</h3><p>Claudeがタスクを進める途中で、作業に必要なフォルダへのアクセス許可を求められます。内容を確認して「<strong>許可</strong>」をクリックすると作業が続行します。</p></div>
      ${imgSlot('cowork-proceed','フォルダアクセス許可の画面')}
      <div class="callout warn"><span class="callout-icon">⚠️</span><div>許可したフォルダのファイルをClaudeが読み書きできるようになります。不安な方はまず1つだけ許可して試してみてください。</div></div>
      <div class="instruction"><div class="instruction-num">4</div><h3>作業の完了を待つ</h3><p>許可した後は、Claudeが自動的に作業を進めます。画面右側の「<strong>進行状況</strong>」で状態を確認できます。</p></div>
      <div class="callout tip"><span class="callout-icon">🎉</span><div><strong>Coworkが使えるようになりました！</strong><br>作業中はアプリを開いたままにしてください。閉じると作業が中断されます。</div></div>`});
  }

  /* 6: Git */
  if(wantCode){
    if(wantCowork){
      steps.push({badge:'次の機能へ',title:'続いてCodeタブの準備をしよう',desc:'Coworkの準備が完了しました。次はCodeタブを使うための準備です。',content:`
        <div class="callout tip"><span class="callout-icon">✅</span><div>Coworkは完了済み。Codeタブを使うにはもう少し準備が必要です。</div></div>`});
    }
    steps.push({badge:`STEP ${n++} ─ Code準備`,title:'Gitをインストールする',desc:'Codeタブを使うには「Git」というソフトが必要です。どちらのOSでも確認・インストールしておきましょう。',content:W?`
      <div class="instruction"><div class="instruction-num">1</div><h3>ダウンロードページを開く</h3><p>以下のリンクを開いてください：</p><p><a href="https://git-scm.com/download/win" target="_blank" rel="noopener">Git for Windows ダウンロードページ ↗</a></p></div>
      <div class="instruction"><div class="instruction-num">2</div><h3>ダウンロードして実行</h3><p>「Click here to download」をクリックして、ダウンロードされたファイルを開きます。</p></div>
      <div class="instruction"><div class="instruction-num">3</div><h3>インストール</h3><p>設定画面が<strong>何度も</strong>表示されますが、<strong>すべてそのまま「Next」→「Next」→...→「Install」</strong>で大丈夫です。</p></div>
      ${imgSlot('git-win','Gitインストール画面（Next連打でOK）')}
      <div class="callout tip"><span class="callout-icon">✅</span><div>10個以上の選択画面が出ますが、全部デフォルトのまま進めてOKです。</div></div>
      <div class="instruction"><div class="instruction-num">4</div><h3>Claudeアプリを再起動する</h3><p>Gitのインストール後、<strong>Claudeアプリを一度閉じて、もう一度開いてください</strong>。これでCodeタブがGitを認識します。</p></div>
    `:`
      <div class="instruction"><div class="instruction-num">1</div><h3>Gitをインストールする</h3><p>「ターミナル」を開きます。⌘（コマンド）+ スペースキーを同時に押すとSpotlight検索が開くので、「<strong>ターミナル</strong>」と入力してクリックしてください。</p></div>
      ${imgSlot('terminal-open','ターミナルの開き方')}
      <div class="instruction"><div class="instruction-num">2</div><h3>インストールコマンドを実行</h3><p>ターミナルが開いたら、以下を入力してEnterを押してください：</p><div class="code-block"><code>xcode-select --install</code><button class="copy-btn" onclick="copyCode(this)">コピー</button></div><p>ポップアップが表示されたら「<strong>インストール</strong>」をクリックしてください。自動的にGitがインストールされます。</p></div>
      ${imgSlot('git-install-cmd','ターミナルでxcode-select --installを実行')}
      <div class="callout info"><span class="callout-icon">💡</span><div>すでにインストール済みの場合は「既にインストールされています」と表示されます。その場合はそのまま次へ進んでOKです。</div></div>
      <div class="instruction"><div class="instruction-num">3</div><h3>バージョンを確認する</h3><p>インストールが完了したら、以下を入力してEnterを押してください：</p><div class="code-block"><code>git --version</code><button class="copy-btn" onclick="copyCode(this)">コピー</button></div><p>「git version 2.x.x」のようにバージョンが表示されれば<strong>成功</strong>です。</p></div>
      ${imgSlot('git-mac-check','ターミナルでgit --versionを実行した結果')}
      <div class="instruction"><div class="instruction-num">4</div><h3>Claudeアプリを再起動</h3><p>Gitのインストールが終わったら、<strong>Claudeアプリを一度閉じて、もう一度開いてください</strong>。</p></div>
      <div class="callout tip"><span class="callout-icon">✅</span><div>ターミナルを使うのはこの確認だけです。この後はすべてアプリ内で操作します。</div></div>
    `});
  }

  /* 7: Code タブ */
  if(wantCode){
    steps.push({badge:`STEP ${n++} ─ Code`,title:'Codeタブを開いて使ってみよう',desc:'AIがあなたのPCのファイルを直接編集してくれます。',content:`
      <div class="instruction"><div class="instruction-num">1</div><h3>「Code」タブをクリック</h3><p>アプリ左上の<strong>Code</strong>アイコンをクリックします。</p>${tabVis('Code')}</div>
      ${W?'<div class="callout info"><span class="callout-icon">💡</span><div>初回はランタイムのセットアップが自動で行われる場合があります。表示に従って待ってください。</div></div>':''}
      <div class="instruction"><div class="instruction-num">2</div><h3>作業フォルダを選択する</h3><p>画面下部に「<strong>ローカル</strong>」と表示されていることを確認してください（あなたのPC上で直接ファイルを操作するモードです）。</p><p>その横のフォルダ選択ボタンから、Claudeに作業させたいフォルダを選びます。</p><p>まずはデスクトップに「test」などの空フォルダを新しく作って、それを選ぶのがおすすめです。</p></div>
      ${imgSlot('code-local','Codeタブ：ローカル確認と作業フォルダ選択')}
      <div class="instruction"><div class="instruction-num">3</div><h3>試しに指示を出してみよう</h3><p>テキストボックスに日本語で指示を入力して送信します。例：</p><div class="code-block"><code>デスクトップにあるスクリーンショットのみを削除してください</code><button class="copy-btn" onclick="copyCode(this)">コピー</button></div></div>
      <div class="instruction"><div class="instruction-num">4</div><h3>実行内容を確認して許可する</h3><p>Claudeが実行しようとするコマンドを表示します。内容を確認して「<strong>一度だけ許可</strong>」または「<strong>常に許可</strong>」をクリックすると、実際にファイルが操作されます。</p></div>
      ${imgSlot('code-example','実行内容の確認と許可画面')}
      <div class="callout tip"><span class="callout-icon">🎉</span><div><strong>Codeタブが使えるようになりました！</strong><br>あなたが許可するまで実際のファイルには反映されないので、安心して試してください。</div></div>
      <div class="callout warn"><span class="callout-icon">⚠️</span><div><strong>うまく動かない場合：</strong><br>・Gitがインストールされているか確認（前のステップ参照）<br>・Claudeアプリを最新版に更新する<br>・アプリを一度閉じて開き直す</div></div>`});
  }

  /* セットアップ完了 → 初期設定への分岐 */
  steps.push({badge:'完了',title:null,isMidCompletion:true,content:''});

  /* 初期設定ステップ */
  steps.push({badge:'初期設定',title:'最低限やっておきたい5つの設定',desc:'5分で終わります。安全に使うために確認しましょう。',content:`
    <div class="instruction"><div class="instruction-num">1</div><h3>言語設定</h3><p>画面左下のアカウントメニュー → 言語 →「<strong>日本語（日本）</strong>」に変更します。</p></div>
    ${imgDirect('setting-lang.jpg','言語設定画面')}

    <div class="instruction"><div class="instruction-num">2</div><h3>プライバシー設定</h3><p>設定 > プライバシー を開いてください。</p>
      <div class="check-item" onclick="toggleCheck(this)"><span class="check-box"></span><span>ロケーションメタデータ → <strong>オフ</strong></span></div>
      <div class="check-item" onclick="toggleCheck(this)"><span class="check-box"></span><span>Claudeの改善にご協力ください → <strong>オフ</strong></span></div>
      <p style="font-size:13px;color:var(--text-dim);">※ オンのままだと会話が学習に使われる可能性があります。</p>
    </div>
    ${imgDirect('setting-privacy2.jpg','プライバシー設定画面')}

    <div class="instruction"><div class="instruction-num">3</div><h3>コード実行とファイル作成</h3><p>設定 > 機能 を開いてください。</p>
      <div class="check-item" onclick="toggleCheck(this)"><span class="check-box"></span><span>コード実行 → <strong>オン</strong>（オフだとClaude Codeが機能しません）</span></div>
      <div class="check-item" onclick="toggleCheck(this)"><span class="check-box"></span><span>ネットワーク外部通信 → <strong>オフ</strong>（データ漏洩リスク防止）</span></div>
    </div>
    ${imgDirect('setting-code.jpg','コード実行とファイル作成の設定画面')}

    <div class="instruction"><div class="instruction-num">4</div><h3>コネクタ</h3><p>設定 > コネクタ を開いてください。</p>
      <div class="check-item" onclick="toggleCheck(this)"><span class="check-box"></span><span>Claude in Chrome → <strong>オン推奨</strong></span></div>
      <p style="font-size:13px;color:var(--text-dim);">ブラウザ操作の自動化が可能に。アクセスは都度許可制なので安全です。</p>
    </div>
    ${imgDirect('setting-connector.jpg','コネクタ設定画面')}

    <div class="instruction"><div class="instruction-num">5</div><h3>Claude Code Desktop</h3><p>設定 > Claude Code を開いてください。</p>
      <div class="callout warn"><span class="callout-icon">🚨</span><div><strong>絶対オフにすべき設定</strong></div></div>
      <div class="check-item" onclick="toggleCheck(this)"><span class="check-box"></span><span>「バイパス権限モード」→ <strong>絶対オフ</strong>（確認なしで危険なコマンドが実行されてしまう）</span></div>
      <div class="check-item" onclick="toggleCheck(this)"><span class="check-box"></span><span>「すべてのブラウザアクションを許可」→ <strong>絶対オフ</strong></span></div>
      <div class="check-item" onclick="toggleCheck(this)"><span class="check-box"></span><span>「コンピュータ操作の許可」→ <strong>現状オフ推奨</strong>（速度が遅くトークン消費も多い割に効果が薄い）</span></div>
    </div>
    ${imgDirect('setting-claude-code.jpg','Claude Code Desktop設定画面')}
    ${imgDirect('setting-browser2.jpg','すべてのブラウザアクションを許可 → オフ')}

    <div class="callout info"><span class="callout-icon">💡</span><div><strong>その他（使いながら調整でOK）</strong><br>外観テーマ、メモリ生成、Cowork/Dispatch設定、Chromeのサイトアクセス管理、スタートアップ起動、スリープ防止設定など。</div></div>
  `});

  /* 最終完了 */
  steps.push({badge:'完了',title:null,isCompletion:true,content:''});
}

function startGuide(){buildSteps();currentStep=0;document.getElementById('landing').classList.add('hidden');document.getElementById('navBar').classList.add('visible');renderStep();}

function renderStep(){
  const c=document.getElementById('stepContainer'),s=steps[currentStep],t=steps.length-1;
  document.getElementById('progressFill').style.width=Math.round((currentStep/t)*100)+'%';
  document.getElementById('progressPill').textContent=currentStep>=t?'完了！':`${currentStep+1} / ${t}`;
  if(s.isMidCompletion){
    const l=selectedTool==='both'?'Code & Cowork':selectedTool==='code'?'Code':'Cowork';
    c.innerHTML=`<div class="step-screen active"><div class="completion"><div class="completion-icon">🎉</div><h2>セットアップ完了！</h2><p>Claude ${l}が使えるようになりました。<br>続けて初期設定も済ませておくと安心です。</p><div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;"><button class="nav-btn next" onclick="nextStep()">このまま初期設定へ →</button><button class="restart-btn" onclick="resetGuide()">最初に戻る</button></div></div></div>`;
    document.getElementById('nextBtn').classList.add('hidden');document.getElementById('prevBtn').textContent='← 戻る';return;
  }
  if(s.isCompletion){
    c.innerHTML=`<div class="step-screen active"><div class="completion"><div class="completion-icon">✅</div><h2>すべての設定が完了！</h2><p>セットアップも初期設定も完了です。<br>Claudeを存分に活用してください！</p><button class="restart-btn" onclick="resetGuide()">最初に戻る</button></div></div>`;
    document.getElementById('nextBtn').classList.add('hidden');document.getElementById('prevBtn').textContent='← 戻る';return;
  }
  document.getElementById('nextBtn').classList.remove('hidden');
  c.innerHTML=`<div class="step-screen active"><div class="step-badge">${s.badge}</div><h2 class="step-title">${s.title}</h2><p class="step-desc">${s.desc}</p>${s.content}</div>`;
  document.getElementById('prevBtn').style.visibility=currentStep===0?'hidden':'visible';
  document.getElementById('nextBtn').textContent=currentStep===t-1?'完了 🎉':'次へ →';
  window.scrollTo({top:0,behavior:'smooth'});
}
function nextStep(){if(currentStep<steps.length-1){currentStep++;renderStep();}}
function prevStep(){if(currentStep>0){currentStep--;renderStep();}}
function resetGuide(){
  currentStep=0;selectedOS=null;selectedTool=null;
  document.getElementById('stepContainer').innerHTML='';document.getElementById('landing').classList.remove('hidden');
  document.getElementById('navBar').classList.remove('visible');document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressPill').textContent='― / ―';
  document.querySelectorAll('.os-btn,.tool-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('startBtn');btn.disabled=true;btn.textContent='選択してください';window.scrollTo({top:0});
}
function copyCode(btn){
  const code=btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(()=>{btn.textContent='コピー済み ✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent='コピー';btn.classList.remove('copied');},2000);}).catch(()=>{const ta=document.createElement('textarea');ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);btn.textContent='コピー済み ✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent='コピー';btn.classList.remove('copied');},2000);});
}
function toggleCheck(el){el.classList.toggle('checked');el.querySelector('.check-box').textContent=el.classList.contains('checked')?'✓':'';}
</script>
</body>
</html>
